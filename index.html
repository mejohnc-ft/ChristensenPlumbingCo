<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons - Gold "C" logo -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="theme-color" content="#0B1D33" />

    <!-- DNS prefetch and preconnect for external resources -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Heritage Typography - Playfair Display & Inter -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

    <!-- SEO Meta Tags -->
    <title>Christensen Plumbing Co. | Professional Plumbing Services San Diego County</title>
    <meta name="description" content="Professional plumbing services in San Diego County. 24/7 emergency repairs, installations, drain cleaning, and water heater services. Licensed, insured, and trusted since 2003." />
    <meta name="keywords" content="plumber San Diego, emergency plumbing, drain cleaning, water heater repair, pipe installation, San Diego County plumbing services" />
    <meta name="author" content="Christensen Plumbing Co." />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Christensen Plumbing Co. | Professional Plumbing Services San Diego County" />
    <meta property="og:description" content="Professional plumbing services in San Diego County. 24/7 emergency repairs, installations, drain cleaning, and water heater services." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://christensenplumbing.com" />
    <meta property="og:image" content="https://christensenplumbing.com/og-image.jpg" />
    
    <!-- Google Maps API -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9yaqzUGykHbNqhdvuJ6ts0ww54Z7t-XY&libraries=places"></script>

    <!-- Anti-flicker: set theme before paint -->
    <script>
      (function(){var t=localStorage.getItem('christensen-theme')||'light';document.documentElement.setAttribute('data-theme',t)})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
